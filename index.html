<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e5e4e0;
      --text: #1a1a1a;
      --muted: #9a9895;
      --accent: #2d6a4f;
      --radius: 12px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 520px;
      height: 92dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .chat-header h1 { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
    .chat-header .count { margin-left: auto; font-size: 12px; font-family: var(--mono); color: var(--muted); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      padding: 7px 10px;
      border-radius: 8px;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg:hover { background: var(--bg); }

    .msg .meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .msg .name { font-size: 12px; font-weight: 500; color: var(--accent); font-family: var(--mono); }
    .msg .time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .msg .text { font-size: 14px; line-height: 1.55; }

    .msg.old .name, .msg.old .text { color: var(--muted); }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 10px 0;
      color: var(--muted); font-size: 11px; font-family: var(--mono);
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .chat-form {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }

    .name-row { display: flex; align-items: center; gap: 8px; }
    .name-row label { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }

    input {
      font-family: var(--sans); font-size: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text); outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    #name { width: 140px; font-size: 13px; flex-shrink: 0; }

    .input-row { display: flex; gap: 8px; }

    button {
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 16px; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.65; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="dot"></div>
      <h1>chat</h1>
      <span class="count" id="count">—</span>
    </div>

    <div id="messages"></div>

    <form class="chat-form" id="form">
      <div class="name-row">
        <label>nombre →</label>
        <input id="name" type="text" placeholder="Anónimo" autocomplete="off" maxlength="20" />
      </div>
      <div class="input-row">
        <input id="input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
        <button type="submit">Enviar</button>
      </div>
    </form>
  </div>

  <script src="https://tqg8ptx9-3000.use2.devtunnels.ms/socket.io/socket.io.js"></script>
  <script>
    const socket   = io("https://tqg8ptx9-3000.use2.devtunnels.ms/")
    const inputEl  = document.getElementById('input')
    const nameEl   = document.getElementById('name')
    const messages = document.getElementById('messages')
    const countEl  = document.getElementById('count')

    function fmt(d) {
      return new Date(d).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
    }

    function addMsg(data, old = false) {
      const div = document.createElement('div')
      div.className = 'msg' + (old ? ' old' : '')
      div.innerHTML = `
        <div class="meta">
          <span class="name">${data.name || 'Anónimo'}</span>
          <span class="time">${fmt(data.createdAt || new Date())}</span>
        </div>
        <div class="text">${data.message}</div>`
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    }

    socket.on('history', (history) => {
      history.forEach(m => addMsg(m, true))
      if (history.length) {
        const hr = document.createElement('div')
        hr.className = 'divider'
        hr.textContent = 'hoy'
        messages.appendChild(hr)
        messages.scrollTop = messages.scrollHeight
      }
    })

    socket.on('messages', (data) => addMsg(data, false))

    form.addEventListener('submit', (e) => {
      e.preventDefault()
      const text = inputEl.value.trim()
      if (!text) return
      socket.emit('message', { name: nameEl.value.trim() || 'Anónimo', message: text })
      inputEl.value = ''
    })
  </script>
</body>
</html>
